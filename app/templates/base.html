<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {padding-top: 100px;}
    </style>
    {% block head %} {% endblock %}
</head>
<body>
  <nav class="navbar bg-body-tertiary" style="position: fixed; top: 0; left: 0; width: 100%; z-index: 1050;">
    <div class="container-fluid">

      <a class="navbar-brand" href="/">
        <img src="../static/img/quedas-horizontal-1.png" alt="ImgQuedas" width="150" height="">
      </a>

      <form method="post" class="d-flex" role="search" action="{{ url_for('home') }}" style="position: fixed; left: 50%; transform: translate(-50%);">
        <input class="form-control me-2 d-flex justify-content-center" type="search" name="pesquisa" id="pesquisa" placeholder="Pesquisar" aria-label="Search">
        <button class="btn btn-outline-success" type="submit">Buscar</button>
      </form>

      {% if logado %}

      <div class="d-grid gap-2 d-md-flex justify-content-end">
      <a class="btn btn-outline-secondary" href="/postar">Criar Postagem</a>
      <a class="btn btn-outline-secondary" href="{{ url_for('show_user', user_id=session['id'])}}">Meu Perfil</a>
      <a class="btn btn-outline-danger" href="/logout">Sair</a>
      </div>

      {% else %}

      <a class="btn btn-outline-secondary" href="/login">Entrar</a>

      {% endif %}
      

    </div>
  </nav>


  <div class="d-flex flex-column mb-3" style="width: 90vw; height: auto; padding: auto; display: flex; flex-direction: column; margin: auto;">
    {% block body %}
    {% endblock %}
  </div>
   
   
</body>
</html>
